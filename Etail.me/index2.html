<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Etail.me</title>
  </head>
  <body>
    <main class="bg-[url(bg.jpg)] bg-cover bg-center h-screen">
      <nav class="flex justify-center py-5">
        <div
          class="w-full max-w-7xl mx-4 bg-white rounded-full shadow-sm px-6 py-3 flex items-center justify-between"
        >
          <h1 class="text-2xl md:text-3xl font-bold text-blue-950">etail.me</h1>

          <ul class="hidden md:flex space-x-10">
            <li
              class="hover:text-blue-950 transition cursor-pointer font-medium"
            >
              About
            </li>
            <li
              class="hover:text-blue-950 transition cursor-pointer font-medium"
            >
              Feature
            </li>
            <li
              class="hover:text-blue-950 transition cursor-pointer font-medium"
            >
              Pricing
            </li>
          </ul>

          <div class="hidden md:flex items-center space-x-6">
            <h5 class="hover:text-blue-800 font-medium cursor-pointer">
              Login
            </h5>

            <button
              class="bg-blue-950 text-white px-6 py-2 rounded-full hover:bg-blue-800 transition"
            >
              Start Selling
            </button>
          </div>

          <button class="md:hidden text-3xl">☰</button>
        </div>
      </nav>

      <div class="px-6 md:px-10 lg:px-20 py-6">
        <h1
          class="text-slate-50 font-semibold max-w-140 text-5xl md:text-6xl lg:text-8xl leading-none"
        >
          Register <br />
          your store <br />
          name now!
        </h1>
        <p class="max-w-90 text-xl px-2 py-4 font-semibold leading-7">
          With etail.me, anyone can earn their first dollar online. Just start
          with what you know It's that easy.
        </p>
        <div
          class="bg-white shadow-sm rounded-full w-full max-w-md h-fit flex items-center px-4 py-2 my-2"
        >
          <img
            src="https://img.icons8.com/?size=100&id=78230&format=png&color=172554"
            alt="store"
            class="w-6 h-6 mr-3"
          />
          <div class="flex justify-between items-center">
            <span class="font-bold whitespace-nowrap">My store</span>
            <span class="text-gray-400 px-2">|</span>

            <input
              type="text"
              placeholder="Enter your store name"
              class="flex-1 min-w-0 placeholder:text-gray-400 text-gray-400 outline-none"
            />
          </div>

          <div
            class="w-13 h-13 bg-blue-950 hover:bg-blue-800 transition duration-300 rounded-full flex items-center justify-center ml-15"
          >
            <img
              src="https://img.icons8.com/?size=100&id=98968&format=png&color=ffffff"
              alt="Right Arrow"
              class="w-6 h-6"
            />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
